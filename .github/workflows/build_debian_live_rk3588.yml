name: build_debian_live_rk3588
on:
  # push:
  #   branches:
  #     - main
      
  workflow_dispatch:
jobs:
  prepare_release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Get time
        id: time
        uses: nanzm/get-time-action@v1.1
        with:
          format: 'YYYYMMDD-HHmm'
      - name: Create empty release
        id: release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.time.outputs.time }}
          body_path: README.md
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
    outputs:
      release_id: ${{ steps.release.outputs.id }}
  build:
    runs-on: ubuntu-24.04-arm
    needs: prepare_release
    strategy:
      matrix:
        CODENAME: [trixie]
    steps:
      - name: Install deb deps
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: devscripts build-essential debhelper po4a gettext debootstrap libnss-mymachines live-boot-doc live-config-doc live-manual-html systemd-container qemu-user-static debian-archive-keyring
          version: 1.0
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build live-build
        shell: bash
        run: |
          sudo apt update
          ls -alh
          mkdir live-build && cd live-build
          git clone https://salsa.debian.org/live-team/live-build.git -b master --depth=1
          cd live-build
          sudo apt -y install debhelper po4a gettext devscripts build-essential
          dpkg-buildpackage -us -uc
          sudo apt -y install ../live-build_*_all.deb
      - name: Install oras And Get Kernel
        shell: bash
        run: |
          chmod +x kernel.sh
          ./kernel.sh
          echo $(pwd)
      - name: Build live iso
        shell: bash
        run: |
          echo $(pwd)
          mkdir iso-build && cd iso-build
          echo $(pwd)
          cp ../lb-config-${{ matrix.CODENAME }}.sh lb-config.sh
          cp ../addpackage-custom.list.chroot .
          cp ../addpackage-xfce.list.chroot ./addpackage-desktop.list.chroot
          
          chmod +x lb-config.sh
          ./lb-config.sh
          sudo apt -y install qemu-user-static debian-archive-keyring
          
          sudo lb build
          split -b 1800M debian-trixie-live-arm64.hybrid.iso part_
      - name: Upload iso
        uses: xresloader/upload-to-github-release@v1
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ needs.prepare_release.outputs.release_id }}
          # file: iso-build/*.iso
          file: iso-build/part_*
          draft: false
          overwrite: true
      - name: Rollback release
        if: failure()
        uses: author/action-rollback@stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ needs.prepare_release.outputs.release_id }}
