source /boot/grub/config.cfg

# Live boot
menuentry "Live system (arm64)" --hotkey=l {
	linux	/live/vmlinuz-* boot=live components quiet locales=zh_CN.UTF-8 findiso=${iso_path}
	initrd	/live/initrd.img-*
}
menuentry "Live system (arm64 fail-safe mode)" {
	linux	/live/vmlinuz-* boot=live components memtest noapic noapm nodma nomce nosmp nosplash vga=788
	initrd	/live/initrd.img-*
}

# You can add more entries like this
# menuentry "Alternate live boot" {
# linux /live/vmlinuz-*arm64 boot=live components quiet locales=zh_CN.UTF-8 findiso=${iso_path} custom options here
# initrd /live/initrd.img-*arm64
# }
# menuentry "Alternate graphical installer" {
# linux   custom options here
# initrd
# }
# menuentry "Alternate textual installer" {
# linux   custom options here
# initrd
# }

# Installer (if any)
if false; then

source	/boot/grub/install_start.cfg

submenu 'Advanced install options ...' --hotkey=a {

	source /boot/grub/theme.cfg

	source	/boot/grub/install.cfg

}
fi

submenu 'Utilities...' --hotkey=u {

	source /boot/grub/theme.cfg

	# Memtest (if any)
	if false; then
		source /boot/grub/memtest.cfg
	fi

	# Firmware setup (UEFI)
	if [ "${grub_platform}" = "efi" ]; then
		menuentry "UEFI Firmware Settings" --hotkey=f {
			fwsetup
		}
	fi

	# Verify the checksums
	if true; then
		menuentry "Verify integrity of the boot medium" --hotkey=v {
			linux	/live/vmlinuz-* boot=live components  locales=zh_CN.UTF-8 findiso=${iso_path} verify-checksums
			initrd	/live/initrd.img-*
		}
	fi
}
